server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/blog?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 230802
    driver-class-name: com.mysql.cj.jdbc.Driver
  config:
    import: optional:file:./config.yaml
  devtools:
    restart:
      enabled: true
      additional-exclude: static/**,public/**,META-INF/resources/**
    livereload:
      enabled: true
  thymeleaf:
    cache: false
  freemarker:
    cache: false
  groovy:
    template:
      cache: false

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: BlogJwtSecretKey2024VeryLongSecretKeyForHS512Algorithm123456789
  expiration: 86400000
